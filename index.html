<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>✍️ Add a New Blog Post</h1>

    <!--
        action="/add"  → send the form data TO our /add route
        method="POST"  → send it as a POST request
    -->
    <form action="/add" method="POST">

        <!-- TITLE FIELD -->
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" placeholder="Enter post title">

        <!-- AUTHOR FIELD -->
        <label for="author">Author:</label>
        <input type="text" id="author" name="author" placeholder="Enter your name">

        <!-- CONTENT FIELD -->
        <label for="content">Content:</label>
        <textarea id="content" name="content" placeholder="Write your post here..."></textarea>

        <!-- SUBMIT BUTTON -->
        <button type="submit">Add Post</button>

    </form>

    <!-- Link to go back home without adding anything -->
    <a href="/">← Back to Home</a>

</body>
</html>
