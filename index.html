<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Welcome to My Flask Blog!</h1>

    <!-- 🔁 Loop through every post Flask sends us from the JSON file -->
    {% for post in posts %}
    <div class="post">
        <h2>{{ post.title }}</h2>                    <!-- post's title -->
        <p><em>Written by {{ post.author }}</em></p> <!-- post's author -->
        <p>{{ post.content }}</p>                    <!-- post's content -->
    </div>
    {% endfor %}
    <!-- One loop replaces all those hard-coded blocks! -->

</body>
</html>
