<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Blog Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>✏️ Update Blog Post</h1>

    <!--
        action includes the post ID so Flask knows WHICH post to update
        method="POST" so Flask knows we're submitting data
    -->
    <form action="{{ url_for('update', post_id=post['id']) }}" method="POST">

        <!-- TITLE FIELD — pre-filled with current title -->
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{ post['title'] }}">

        <!-- AUTHOR FIELD — pre-filled with current author -->
        <label for="author">Author:</label>
        <input type="text" id="author" name="author" value="{{ post['author'] }}">

        <!-- CONTENT FIELD — pre-filled with current content -->
        <label for="content">Content:</label>
        <textarea id="content" name="content">{{ post['content'] }}</textarea>

        <!-- SUBMIT BUTTON -->
        <button type="submit">Update Post</button>

    </form>

    <!-- Link to go back home without changing anything -->
    <a href="/">← Back to Home</a>

</body>
</html>
